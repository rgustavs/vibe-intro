<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<title>{{TITLE}}</title>
{{FONT_HEAD}}
<style>
{{CSS}}
</style>
</head>
<body>

<div class="deck" id="deck" role="region" aria-label="{{ARIA_LABEL}}">

  <div class="progress" id="progress"></div>

  <div class="brandmark" aria-hidden="true">{{BRANDMARK_SVG}}<span>{{BRANDMARK_LABEL}}</span></div>
  <div class="counter" id="counter">01 / 01</div>

{{SLIDES}}

  <div class="nav" role="navigation" aria-label="slide controls">
    <button id="prev" aria-label="Previous slide">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M9 2L4 7l5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="dots" id="dots" aria-hidden="true"></div>
    <button id="next" aria-label="Next slide">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M5 2l5 5-5 5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
  </div>

  <div class="tapzone left"  id="tap-left"  aria-hidden="true"></div>
  <div class="tapzone right" id="tap-right" aria-hidden="true"></div>

  <div class="hint" id="hint">Swipe or tap to navigate · arrow keys also work</div>

</div>

<script>
{{NAV_JS}}
</script>

</body>
</html>
